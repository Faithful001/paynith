spring.application.name=paynith

server.servlet.context-path=/api/v1
server.port=8080

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

spring.datasource.url=${POSTGRES_DB_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=wallet-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.url=/api/v1/v3/api-docs
springdoc.swagger-ui.config-url=/api/v1/v3/api-docs/swagger-config
springdoc.packages-to-scan=com.king.paynith
springdoc.paths-to-match=/**

app.va.provider=FLUTTERWAVE

flutterwave.webhook.hash=${FLUTTERWAVE_WEBHOOK_HASH}
flutterwave.secret.key=${FLUTTERWAVE_SEC_KEY}
jwt.secret.key=${JWT_SEC_KEY}
withdrawal.hash.secret=${WITHDRAWAL_HASH_SEC}
paystack.secret.key=${PAYSTACK_SEC_KEY}
